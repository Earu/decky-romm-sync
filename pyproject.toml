[tool.basedpyright]
pythonVersion = "3.11"
extraPaths = ["py_modules"]
stubPath = "typings"
typeCheckingMode = "basic"
exclude = ["py_modules/_vendor", "scripts", ".venv"]
reportMissingModuleSource = "none"
reportMissingImports = "warning"
reportRedeclaration = "none"
reportUnusedParameter = "none"
reportUnusedVariable = "warning"

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = ["py_modules/_vendor", "scripts"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # bugbear — common pitfalls
    "SIM",  # simplify — unnecessary complexity
    "UP",   # pyupgrade — modern Python syntax
    "RUF",  # ruff-specific rules
    "ARG",  # unused arguments
]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]
"tests/**" = ["ARG"]

[tool.ruff.lint.isort]
known-first-party = ["lib", "domain", "services", "adapters"]
known-third-party = ["_vendor", "decky"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
