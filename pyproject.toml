[tool.basedpyright]
pythonVersion = "3.11"
extraPaths = ["py_modules"]
stubPath = "typings"
typeCheckingMode = "basic"
exclude = ["py_modules/_vendor", "scripts", ".venv", ".worktrees"]
reportMissingModuleSource = "none"
reportMissingImports = "warning"
reportPrivateUsage = "error"
reportRedeclaration = "none"
reportUnusedParameter = "none"
reportUnusedVariable = "warning"
reportArgumentType = "error"
reportUnnecessaryComparison = "error"
reportUnnecessaryIsInstance = "error"

# Tests inspect and rebind private state of the system under test —
# white-box testing is a deliberate, accepted pattern here. The
# reportPrivateUsage guardrail targets production encapsulation, not
# test setup, so it's disabled under tests/. extraPaths is repeated
# because execution environments do not inherit the top-level value;
# the repo root "." is added on top so test files can resolve the
# top-level `main` module and sibling `tests.*` packages (without it,
# those imports are unresolved and `main.*` symbols degrade to Unknown,
# a blind spot on the callable surface the tests exercise).
[[tool.basedpyright.executionEnvironments]]
root = "tests"
extraPaths = ["py_modules", "."]
reportPrivateUsage = "none"

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = ["py_modules/_vendor", "scripts"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # bugbear — common pitfalls
    "SIM",  # simplify — unnecessary complexity
    "UP",   # pyupgrade — modern Python syntax
    "RUF",   # ruff-specific rules
    "ARG",   # unused arguments
    "ASYNC", # flake8-async — blocking I/O in async functions
    "RET",   # flake8-return
    "C4",    # flake8-comprehensions
    "PIE",   # flake8-pie
    "PERF",  # perflint
    "TC",   # flake8-type-checking
]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]
# pytest-asyncio test bodies legitimately do blocking setup I/O (open,
# os.path) — ASYNC's event-loop concern is a production-only worry, not
# a test one, so the group is disabled under tests/ (same rationale as ARG).
"tests/**" = ["ARG", "ASYNC"]

[tool.ruff.lint.isort]
known-first-party = ["lib", "domain", "services", "adapters"]
known-third-party = ["_vendor", "decky"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
