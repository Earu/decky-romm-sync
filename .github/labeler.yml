      - any-glob-to-any-file:
          - 'py_modules/bootstrap.py'
          - 'py_modules/services/protocols/**'
          - 'py_modules/domain/**'
          - 'py_modules/lib/**'
          - 'CLAUDE.md'

area:ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'sonar-project.properties'
          - 'scripts/**'
