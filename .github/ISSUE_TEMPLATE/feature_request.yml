name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]
assignees: ["danielcopper"]
body:
  - type: markdown
    attributes:
      value: |
        Required fields are the minimum for triage. Optional fields make things significantly easier to act on — please fill what you can, but **don't skip the report just because you can't fill everything**.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing today? What pain are you running into?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the plugin behave? Sketch the UX or the API surface. If you have ideas, share them — if not, leave blank and we'll figure it out.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other designs you weighed, or reasons the obvious solution doesn't fit.
    validations:
      required: false
