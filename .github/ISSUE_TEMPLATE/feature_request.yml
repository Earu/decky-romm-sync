name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]
assignees: ["danielcopper"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing today? What pain are you running into?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should the plugin behave? Sketch the UX or the API surface.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other designs you weighed, or reasons the obvious solution doesn't fit.
    validations:
      required: false
