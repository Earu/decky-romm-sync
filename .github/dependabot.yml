version: 2
updates:
  # Frontend (npm via pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "area:ci"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "area:ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python (test/lint deps pinned in requirements-dev.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "area:ci"
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
