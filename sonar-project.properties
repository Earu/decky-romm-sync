sonar.projectKey=danielcopper_decky-romm-sync
sonar.organization=danielcopper

# Quality Gate
# Make the scanner poll the gate and exit non-zero when it fails, so the
# `sonarcloud` CI job itself carries the gate verdict instead of the async
# SonarCloud app commit status. Branch protection then requires the job — which
# is skipped (and thus reported as passing) for Dependabot, whereas the app
# status never posts on Dependabot PRs and deadlocks auto-merge. Human PRs still
# hard-block: a failed gate fails the required job.
sonar.qualitygate.wait=true

# Sources
sonar.sources=py_modules,src,main.py
sonar.tests=tests,src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,tests/**
sonar.python.version=3.11

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
# Only sonar.javascript.lcov.reportPaths — SonarJS analyzes both .js and .ts here.
# The legacy sonar.typescript.lcov.reportPaths alias causes double-counting on older scanners.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
# py_modules/_vendor/ holds vendored third-party deps (vdf, …) — not our code.
sonar.exclusions=**/node_modules/**,**/dist/**,**/defaults/**,**/bin/**,**/__pycache__/**,py_modules/_vendor/**
# Full frontend in scope. SonarCloud's new-code gate enforces 80% on changed
# lines only — existing untested components don't fail the gate, but any new
# code added to them will need tests. Permanent exclusions:
#   - src/patches/**: monkey-patches into Steam internals, not unit-testable
#   - src/utils/styleInjector.ts: CSS string injection, no logic to assert
#   - src/utils/steamShortcuts.ts: thin wrapper over SteamClient.Apps.* — every
#     call path needs SteamClient mocked end-to-end, no isolated logic to assert
#   - src/types/**: pure type declarations, no executable code
#   - src/index.tsx: thin plugin-entry shim wired via decky-loader
#   - *.config.{js,ts}: build/test/lint config files (rollup, vitest, eslint, size-limit)
#   - src/test-setup.ts: Vitest setup file, mocks only
#   - src/test-utils/**: shared mock harnesses (e.g. @decky/api event bus),
#     consumed only by tests
sonar.coverage.exclusions=**/tests/**,**/conftest.py,src/patches/**,src/types/**,src/index.tsx,src/utils/styleInjector.ts,src/utils/steamShortcuts.ts,*.config.js,*.config.ts,src/test-setup.ts,src/test-utils/**,py_modules/_vendor/**

# Suppress false positives
# S6926: "async without await" — Decky Loader callable framework requires all
# exposed methods to be async, even when they only delegate to sync service calls.
sonar.issue.ignore.multicriteria=fp1,fp2,fp3,fp4
sonar.issue.ignore.multicriteria.fp1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.fp1.resourceKey=main.py
# S7503 also fires on service methods that are async for run_in_executor wrapping
sonar.issue.ignore.multicriteria.fp2.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.fp2.resourceKey=py_modules/services/**
# S4830 (cert validation) + S5527 (hostname verification): SSL verification is
# intentionally optional — user-facing setting (allow_insecure_ssl) for
# self-hosted RomM servers with self-signed certificates.
sonar.issue.ignore.multicriteria.fp3.ruleKey=python:S4830
sonar.issue.ignore.multicriteria.fp3.resourceKey=py_modules/adapters/romm/http.py
sonar.issue.ignore.multicriteria.fp4.ruleKey=python:S5527
sonar.issue.ignore.multicriteria.fp4.resourceKey=py_modules/adapters/romm/http.py
