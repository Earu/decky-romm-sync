[tools]
node = "24"      # major pin — "lts" is a moving alias that silently jumps majors; CI uses node 24
pnpm = "10.29.3" # exact — must match package.json "packageManager"; bump both together
python = "3.11"  # match Decky Loader's embedded Python (libpython3.11)
uv = "0.10.2"    # exact — uv creates the venv AND compiles the dependency locks; pin so the local resolver == the lock author
deno = "2.8"     # minor pin — deno fmt is a formatter; a version jump can reformat Markdown (the CI drift we're killing)

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.setup]
description = "Install JS and Python dependencies"
run = ["pnpm install", "uv pip install -r requirements-dev.lock", "git config core.hooksPath .githooks"]

[tasks.lock-update]
description = "Recompile the pinned Python dependency locks from the requirements-*.txt sources (run after editing a source or bumping a pin)"
run = [
    "uv pip compile requirements-dev.txt -o requirements-dev.lock",
    "uv pip compile requirements-docs.txt -o requirements-docs.lock",
]

[tasks.build]
description = "Build frontend (dev: with source maps)"
run = "pnpm build:dev"
depends = ["setup"]

[tasks.test]
description = "Run Python tests"
run = "python -m pytest tests/ -q"

[tasks."test:frontend"]
description = "Run frontend tests"
run = "pnpm test"

[tasks."test:frontend:coverage"]
description = "Run frontend tests with coverage report"
run = "pnpm test:coverage"

[tasks."lint:md"]
description = "Lint Markdown with markdownlint-cli2 (CI parity)"
run = "pnpm exec markdownlint-cli2 \"**/*.md\" \"!node_modules\" \"!.worktrees\" \"!CHANGELOG.md\" \"!site\""

[tasks.lint]
description = "Check Cosmic Python architecture rules (layer imports + forbidden service calls) and Markdown"
depends = ["lint:md"]
run = [
    "PYTHONPATH=py_modules lint-imports",
    "python scripts/check_service_independence_contract.py",
    "python scripts/check_callable_manifest.py",
    "bash scripts/check_cosmic_call_bans.sh",
    "python scripts/check_failure_shape.py --check",
    "python scripts/check_event_parity.py",
    "python scripts/check_settings_owner.py",
    "python scripts/check_lock_sync.py",
]

[tasks.deploy]
description = "Deploy plugin files to Decky plugin directory"
depends = ["build"]
raw = true
run = """
DEST="$HOME/homebrew/plugins/decky-romm-sync"
# The plugin dir can be root-owned (Decky's root plugin_loader re-owns files like
# plugin.json on each load), which makes the rsync/cp below hit "permission
# denied". Ownership is reset by the `dev` task BEFORE this runs — it must happen
# there, not here: mise pipes this sub-run (the `[deploy] $` prefix) so it has no
# controlling tty, and a `sudo` here can't reuse the tty-bound cached credential
# and silently fails. Run via `dev`, not `deploy` standalone, on a root-owned dir.
mkdir -p "$DEST/dist" "$DEST/bin" "$DEST/defaults" "$DEST/py_modules"
rsync -a --delete dist/ "$DEST/dist/"
rsync -a --delete bin/ "$DEST/bin/"
rsync -a --delete defaults/ "$DEST/defaults/"
rsync -a --delete py_modules/ "$DEST/py_modules/"
cp -f main.py plugin.json package.json "$DEST/"
"""

[tasks.docs]
description = "Serve the documentation site locally with live reload"
run = "mkdocs serve"

[tasks."docs:build"]
description = "Build the documentation site (strict mode fails on broken links)"
run = "mkdocs build --strict"

[tasks.dev]
description = "Build, deploy, and restart plugin loader"
raw = true
run = """
sudo -v
# Reset plugin-dir ownership HERE, in dev's tty-attached (raw) shell, so sudo
# reuses the credential just cached by `sudo -v`. The deploy sub-run can't do it:
# mise pipes it (no controlling tty), so its `sudo` can't reuse the tty-bound
# credential and silently fails, leaving plugin.json root-owned and breaking the
# cp. `id -un`/`id -gn` are used directly (robust regardless of the task env).
DEST="$HOME/homebrew/plugins/decky-romm-sync"
[ -d "$DEST" ] && sudo chown -R "$(id -un):$(id -gn)" "$DEST"
mise run deploy
sudo systemctl restart plugin_loader
"""
